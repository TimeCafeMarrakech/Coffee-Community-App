# Firebase App Hosting Configuration
# This file configures the runtime environment for your application.

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 0
  maxInstances: 100

env:
  # Expose the Gemini API Key to the build and runtime environments
  - variable: API_KEY
    availability:
      - BUILD
      - RUNTIME